<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CheckReel Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="icon" href="../images/favicon.png" />
</head>
<body>
  <header class="dashboard-header">
    <div id="scan-counter">🔍 0 scans</div>
    <div id="plan-selector">
      <label data-i18n="dashboard-plan-label">Plan:</label>
      <select id="plan-dropdown">
        <option value="free">Free Trial</option>
        <option value="standard">Standard</option>
        <option value="pro">Pro</option>
      </select>
    </div>
    <div class="logo-container">
      <img src="../images/checkreel-logo.png" alt="CheckReel Logo" class="dashboard-logo" />
    </div>
  </header>

  <main class="dashboard-main">
    <section id="region-buttons">
      <button><img src="../images/region-icons/middle-east.png" alt="Middle East" /></button>
      <button><img src="../images/region-icons/mena.png" alt="MENA" /></button>
      <button><img src="../images/region-icons/europe.png" alt="Europe" /></button>
      <button><img src="../images/region-icons/global.png" alt="Global" /></button>
    </section>
    <!-- Add more dashboard functionality here -->
  </main>

  <script src="dashboard.js" defer></script>
</body>
</html>
