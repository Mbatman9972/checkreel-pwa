<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CheckReel Admin</title>
  <style>
    body { font-family: Arial; padding: 2rem; background: #0f172a; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
    th, td { padding: 0.75rem; border: 1px solid #374151; text-align: left; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <table id="userTable">
    <thead>
      <tr>
        <th>ID</th><th>Email</th><th>Plan</th><th>Expires</th><th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbwKWcb5Tx2wHhyGn5Bwec4nwumlSibm9VPpJ2lR269M8e_xt-x7bUe2GmZX17FKJRk/exec';

    async function loadUsers() {
      const res = await fetch(`${API}?action=listUsers`);
      const users = await res.json();
      const tbody = document.querySelector('#userTable tbody');
      tbody.innerHTML = '';

      users.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.id}</td>
          <td>${user.email}</td>
          <td>${user.plan}</td>
          <td>${user.expires}</td>
          <td><button onclick="grantMonth('${user.id}')">+1 mo</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    async function grantMonth(userId) {
      await fetch(`${API}?action=grantMonth&id=${userId}`);
      alert(`Granted +1 month to ${userId}`);
      loadUsers();
    }

    loadUsers();
  </script>
</body>
</html>
