<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckReel</title>

  <!-- Favicon / logo -->
  <link rel="icon" href="images/favicon.png" type="image/png" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ───────── HERO ───────── -->
  <header class="hero">
    <div class="overlay">
      <h1 id="hero-title">Loading…</h1>
      <p  id="hero-subtitle"></p>

      <ul id="hero-benefits"></ul>

      <form id="subscribe-form">
        <input  type="email" id="email-input" placeholder="Enter your email" required />
        <button type="submit" id="subscribe-button">Subscribe</button>
      </form>

      <p id="subscription-note"></p>
      <p id="active-users">🎯 2697 Active Users</p>
    </div>
  </header>

  <!-- ───────── PLATFORMS ───────── -->
  <section class="platforms">
    <h2 id="platforms-title">Supported Platforms</h2>
    <div class="platform-logos">
      <img src="images/platforms/tiktok.png"    alt="TikTok logo"   />
      <img src="images/platforms/youtube.png"   alt="YouTube logo" />
      <img src="images/platforms/instagram.png" alt="Instagram logo" />
      <img src="images/platforms/twitter.png"   alt="Twitter logo" />
      <img src="images/platforms/threads.png"   alt="Threads logo" />
      <img src="images/platforms/snapchat.png"  alt="Snapchat logo" />
    </div>
  </section>

  <!-- ───────── ABOUT ───────── -->
  <section class="about">
    <h2 id="about-title">About CheckReel</h2>
    <p  id="about-content"></p>
  </section>

  <!-- ───────── LANGUAGE SWITCHER ───────── -->
  <select id="language-switcher" class="lang-switch">
    <option value="en" selected>English</option>
    <option value="fr">Français</option>
    <option value="ar">العربية</option>
  </select>

  <!-- Main script -->
  <script src="app.js"></script>
</body>
</html>
