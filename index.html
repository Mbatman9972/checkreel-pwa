<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CheckReel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="hero">
    <img src="images/checkreel-logo.png" alt="CheckReel Logo" class="logo">
    <h1 id="title"></h1>
    <p id="tagline"></p>
  </section>

  <section class="services">
    <h2 id="services-title"></h2>
    <ul id="services-list"></ul>
  </section>

  <section class="subscription">
    <h2 id="start-trial-title"></h2>
    <form id="subscription-form">
      <input type="email" id="email" placeholder="">
      <button type="submit" id="subscribe-button"></button>
    </form>
    <p id="subscription-note"></p>
    <p id="subscription-count"></p>
  </section>

  <section class="platforms">
    <h2 id="platforms-title"></h2>
    <div class="platform-icons">
      <img src="images/platform-logos/tiktok.png" alt="TikTok">
      <img src="images/platform-logos/youtube.png" alt="YouTube">
      <img src="images/platform-logos/instagram.png" alt="Instagram">
      <img src="images/platform-logos/snapchat.png" alt="Snapchat">
      <img src="images/platform-logos/facebook.png" alt="Facebook">
      <img src="images/platform-logos/threads.png" alt="Threads">
      <img src="images/platform-logos/twitter.png" alt="Twitter">
      <img src="images/platform-logos/podcasts.png" alt="Podcasts">
    </div>
  </section>

  <section class="about">
    <h2 id="about-title"></h2>
    <p id="about-content"></p>
  </section>

  <footer>
    <select id="language-selector">
      <option value="en">English</option>
      <option value="ar">العربية</option>
      <option value="fr">Français</option>
    </select>
  </footer>

  <script src="app.js"></script>
</body>
</html>
