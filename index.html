<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CheckReel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="hero">
    <img src="images/checkreel-logo.png" alt="CheckReel Logo" class="logo">
    <h1 id="hero-title"></h1>
    <p id="hero-subtitle"></p>
    <button id="start-trial"></button>
  </header>

  <section class="benefits" id="benefits-list"></section>

  <section class="services">
    <h2 id="services-title">Our Services</h2>
    <div class="service-list" id="services-list"></div>
  </section>

  <section class="platforms">
    <h2 id="platforms-title">Supported Platforms</h2>
    <div class="platform-logos" id="platform-logos"></div>
  </section>

  <section class="subscription">
    <h2 id="subscription-title"></h2>
    <form id="subscription-form">
      <input type="email" id="email" placeholder="">
      <button type="submit" id="subscribe-button"></button>
    </form>
    <p id="subscription-note"></p>
    <p id="active-users"></p>
  </section>

  <section class="about">
    <h2 id="about-title"></h2>
    <p id="about-content"></p>
  </section>

  <footer class="footer">
    <select id="language-select">
      <option value="en">English</option>
      <option value="ar">العربية</option>
      <option value="fr">Français</option>
    </select>
  </footer>

  <script src="app.js"></script>

</body>
</html>
