<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CheckReel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section id="hero">
    <h1 id="hero-title">Loading...</h1>
    <p id="hero-subtitle"></p>
    <div id="hero-benefits"></div>
    <form id="subscribe-form">
      <input type="email" id="email-input" placeholder="Enter your email" required />
      <button type="submit" id="subscribe-button">Subscribe</button>
    </form>
    <p id="subscription-note"></p>
    <p id="active-users">🎯 2697 Active Users</p>
  </section>

  <section id="platforms">
    <h2 id="platforms-title">Supported Platforms</h2>
    <ul>
      <li>TikTok</li>
      <li>YouTube</li>
      <li>Instagram</li>
    </ul>
  </section>

  <section id="about">
    <h2 id="about-title">About CheckReel</h2>
    <p id="about-content"></p>
  </section>

  <select id="language-switcher">
    <option value="en" selected>English</option>
    <option value="fr">Français</option>
    <option value="ar">العربية</option>
  </select>

  <script src="app.js"></script>
</body>
</html>
