<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkreel</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/checkreel-logo.png" />
  
  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Hero Section: Full-screen landing background -->
  <section class="hero">
    <!-- Header overlay with logo and app name -->
    <header class="site-header">
      <div class="header-content">
        <img src="images/checkreel-logo.png" alt="Checkreel Logo" class="logo" />
        <span class="app-name">Checkreel</span>
      </div>
    </header>

    <!-- Central Hero Content -->
    <div class="hero-content">
      <h2>Experience Innovation in Digital Media</h2>
      <p>Your gateway to connection and creativity.</p>
    </div>
  </section>
  
  <!-- Subscription Section -->
  <section class="subscription">
    <div class="subscription-content">
      <h2>Start Your Free Trial</h2>
      <form id="subscription-form" action="#" method="post">
        <input type="email" name="email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
      </form>
    </div>
  </section>
  
  <!-- JavaScript (if needed) -->
  <script src="app.js"></script>
</body>
</html>
